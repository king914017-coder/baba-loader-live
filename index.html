<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Panel</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: #fff; padding: 15px; margin: 0; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; }
        input, select, button { padding: 10px; margin: 8px 0; width: 100%; font-size: 16px; border-radius: 5px; box-sizing: border-box; }
        input, select { background: #2a2a2a; color: white; border: 1px solid #444; }
        button { background: #00adb5; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #007c82; }
        .admin-btn { background: #ff5722; }
        .admin-btn:hover { background: #e64a19; }
        .logout-btn { background: #dc3545; }
        .block-btn { background: #dc3545; padding: 5px; font-size: 12px; width: auto; margin:0;}
        .unblock-btn { background: #28a745; padding: 5px; font-size: 12px; width: auto; margin:0;}
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #333; color: #00adb5; }
        .hidden { display: none; }
        .toggle-link { color: #00adb5; cursor: pointer; text-align: center; display: block; margin-top: 10px; }
        .admin-zone { border: 1px dashed #ff5722; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: rgba(255, 87, 34, 0.05); }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            th { display: none; }
            td { position: relative; padding-left: 50%; text-align: right; }
            td::before { content: attr(data-label); position: absolute; left: 10px; font-weight: bold; text-align: left; color: #00adb5; }
        }
    </style>
</head>
<body>

<div id="authScreen" class="box">
    <h2 style="text-align: center; color: #00adb5;">🔐 Baba Panel Auth</h2>
    
    <div id="loginForm">
        <input type="text" id="logUser" placeholder="Username">
        <input type="password" id="logPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <span class="toggle-link" onclick="toggleAuth()">New user| Create account</span>
    </div>

    <div id="registerForm" class="hidden">
        <input type="text" id="regUser" placeholder="New Username">
        <input type="password" id="regPass" placeholder="New Password">
        <input type="text" id="regInvite" placeholder="Invite Code">
        <button onclick="register()">Register</button>
        <span class="toggle-link" onclick="toggleAuth()">Already have an account| Login</span>
    </div>
</div>

<div id="dashboardScreen" class="box hidden">
    <h2 style="text-align: center; color: #00adb5;">🚀 <span id="welcomeName"></span>'s Panel</h2>
    
    <div id="adminPanel" class="admin-zone hidden">
        <h3 style="margin: 0 0 10px 0; color: #ff5722;">👑 Admin Zone (Reseller Management)</h3>
        <button class="admin-btn" onclick="generateInvite()">🎟️ New Invite Code</button>
        
        <table style="margin-top: 15px;">
            <thead>
                <tr>
                    <th>Reseller Name</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="resellersTable"></tbody>
        </table>
    </div>

    <hr style="border-color: #333;">

    <h3>🔑 Create New Key</h3>
    <input type="text" id="customKey" placeholder="Custom Key (Optional) - Leave blank for Random">
    <select id="duration">
        <option value="1">1 Day</option>
        <option value="7">7 Days</option>
        <option value="30">30 Days</option>
    </select>
    <button onclick="generateKey()">➕ Generate Key</button>
    
    <hr style="border-color: #333;">

    <h3>📋 Keys List</h3>
    <table>
        <tbody id="keysTable"></tbody>
    </table>
    
    <button class="logout-btn" style="margin-top:20px;" onclick="logout()">🚪 Logout</button>
</div>

<script>
    const API_URL = "/api";

    function getAuthHeaders() {
        return {
            'Content-Type': 'application/json',
            'x-username': localStorage.getItem('panel_user'),
            'x-password': localStorage.getItem('panel_pass')
        };
    }

    function toggleAuth() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('registerForm').classList.toggle('hidden');
    }

    async function login() {
        const u = document.getElementById('logUser').value;
        const p = document.getElementById('logPass').value;
        const res = await fetch(`${API_URL}/login`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('panel_user', u);
            localStorage.setItem('panel_pass', p);
            localStorage.setItem('panel_role', data.role);
            checkLoginState();
        } else { alert(data.message); }
    }

    async function register() {
        const u = document.getElementById('regUser').value;
        const p = document.getElementById('regPass').value;
        const i = document.getElementById('regInvite').value;
        const res = await fetch(`${API_URL}/register`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p, inviteCode: i})
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) toggleAuth(); 
    }

    function logout() {
        localStorage.clear();
        checkLoginState();
    }

    function checkLoginState() {
        const user = localStorage.getItem('panel_user');
        const role = localStorage.getItem('panel_role');
        
        if (user) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('welcomeName').innerText = user.toUpperCase();
            
            if(role === 'admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
                loadResellers();
            } else {
                document.getElementById('adminPanel').classList.add('hidden');
            }
            
            loadKeys();
        } else {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
        }
    }

    async function generateInvite() {
        const res = await fetch(`${API_URL}/create_invite`, { method: 'POST', headers: getAuthHeaders() });
        const data = await res.json();
        if(data.success) alert("Reseller Invite Code:\n\n" + data.invite);
        else alert(data.message);
    }

    
    async function loadResellers() {
        const res = await fetch(`${API_URL}/users`, { headers: getAuthHeaders() });
        if(!res.ok) return;
        const users = await res.json();
        
        const table = document.getElementById('resellersTable');
        table.innerHTML = "";
        
        users.forEach(u => {
            const btnClass = u.status === 'blocked' ? 'unblock-btn' : 'block-btn';
            const btnText = u.status === 'blocked' ? 'Unblock' : 'Block 🚫';
            table.innerHTML += `
                <tr>
                    <td data-label="User">${u.username}</td>
                    <td data-label="Status">${u.status}</td>
                    <td data-label="Action">
                        <button class="${btnClass}" onclick="toggleUserStatus('${u.username}')">${btnText}</button>
                    </td>
                </tr>`;
        });
    }

    
    async function toggleUserStatus(username) {
        if(!confirm(`Kya aap sach me ${username} ka status badalna chahte hain?`)) return;
        
        const res = await fetch(`${API_URL}/toggle_user`, {
            method: 'POST', headers: getAuthHeaders(),
            body: JSON.stringify({ targetUser: username })
        });
        const data = await res.json();
        alert(data.message);
        loadResellers();
    }

    
    async function generateKey() {
        const duration = document.getElementById('duration').value;
        const custom = document.getElementById('customKey').value;

        const res = await fetch(`${API_URL}/generate`, {
            method: 'POST', headers: getAuthHeaders(),
            body: JSON.stringify({ durationDays: duration, customKey: custom })
        });
        
        const data = await res.json();
        if(data.success) { 
            alert("Key Generated:\n" + data.key); 
            document.getElementById('customKey').value = "";
            loadKeys(); 
        }
        else { alert(data.message); if(data.message.includes("Login required") || data.message.includes("BLOCK")) logout(); }
    }

    async function loadKeys() {
        const res = await fetch(`${API_URL}/keys`, { headers: getAuthHeaders() });
        if(res.status === 401 || res.status === 403) { alert("Session Expired ya aap block hain."); return logout(); }
        
        const keys = await res.json();
        const table = document.getElementById('keysTable');
        table.innerHTML = "";
        
        for (let i = keys.length - 1; i >= 0; i--) {
            let k = keys[i];
            table.innerHTML += `
                <tr>
                    <td data-label="Key"><strong>${k.key}</strong></td>
                    <td data-label="Days">${k.durationDays}D</td>
                    <td data-label="Status">[${k.status}]</td>
                    <td data-label="Owner" style="color: #aaa; font-size:12px;">Made by: ${k.owner}</td>
                </tr>`;
        }
    }

    checkLoginState();
</script>
</body>
</html>
